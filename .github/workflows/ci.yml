name: SkillPulse CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: skillpulse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    name: Validate and test application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Verify Go dependencies
        working-directory: backend
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Compile and test backend
        working-directory: backend
        run: go test ./...

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci-root-password
          DB_HOST=db
          DB_PORT=3306
          DB_USER=skillpulse
          DB_PASSWORD=ci-database-password
          DB_NAME=skillpulse
          EOF

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build

      - name: Start integration environment
        run: docker compose up -d

      - name: Show container status
        run: docker compose ps

      - name: Wait for application health
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8080/health; then
              echo
              echo "SkillPulse health check passed."
              exit 0
            fi

            echo "Waiting for SkillPulse... attempt ${attempt}/30"
            sleep 5
          done

          echo "Application did not become healthy in time."
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Test skills API
        run: |
          curl --fail --silent http://localhost:8080/api/skills \
            | grep --quiet '"name":"Docker"'

      - name: Display logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop integration environment
        if: always()
        run: docker compose down --volumes --remove-orphans
