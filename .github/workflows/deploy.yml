name: Deploy SkillPulse to EC2

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy, such as latest or a seven-character commit SHA"
        required: true
        default: "latest"

permissions:
  contents: read

concurrency:
  group: skillpulse-production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/skillpulse-ec2
          chmod 600 ~/.ssh/skillpulse-ec2

      - name: Add EC2 host key
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Create deployment directory
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh \
            -i ~/.ssh/skillpulse-ec2 \
            "$EC2_USER@$EC2_HOST" \
            "mkdir -p /opt/skillpulse/mysql"

      - name: Copy deployment files
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp \
            -i ~/.ssh/skillpulse-ec2 \
            docker-compose.prod.yml \
            "$EC2_USER@$EC2_HOST:/opt/skillpulse/docker-compose.prod.yml"

          scp \
            -i ~/.ssh/skillpulse-ec2 \
            mysql/init.sql \
            "$EC2_USER@$EC2_HOST:/opt/skillpulse/mysql/init.sql"

      - name: Create production environment file
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          ssh \
            -i ~/.ssh/skillpulse-ec2 \
            "$EC2_USER@$EC2_HOST" \
            "cat > /opt/skillpulse/.env" <<EOF
          MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
          DB_HOST=db
          DB_PORT=3306
          DB_USER=skillpulse
          DB_PASSWORD=$DB_PASSWORD
          DB_NAME=skillpulse
          IMAGE_TAG=$IMAGE_TAG
          EOF

      - name: Deploy application
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh \
            -i ~/.ssh/skillpulse-ec2 \
            "$EC2_USER@$EC2_HOST" <<'EOF'
          set -euo pipefail

          cd /opt/skillpulse

          docker compose \
            --env-file .env \
            -f docker-compose.prod.yml \
            pull

          docker compose \
            --env-file .env \
            -f docker-compose.prod.yml \
            up -d --remove-orphans

          docker image prune -f
          EOF

      - name: Verify deployment
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent "http://$EC2_HOST/health"; then
              echo
              echo "SkillPulse deployment is healthy."
              exit 0
            fi

            echo "Waiting for deployment... attempt ${attempt}/30"
            sleep 5
          done

          echo "Deployment health check failed."
          exit 1

      - name: Remove temporary SSH key
        if: always()
        run: rm -f ~/.ssh/skillpulse-ec2
